<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海龟战法回测系统 | Turtle Trading System</title>

<style>
:root {
  --bg: #f5f6fa; --card: #ffffff; --text: #2c3e50; --sub: #7f8c8d;
  --border: #e1e5eb; --accent: #e74c3c; --green: #27ae60; --blue: #3498db;
  --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.header .subtitle { font-size: 11px; opacity: .7; margin-top: 2px; }
.badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:600; margin-left:6px; }
.badge-live { background: #27ae60; }
.badge-api { background: #3498db; margin-left:4px; }

.layout { display:grid; grid-template-columns: 300px 1fr 300px; gap:14px; padding:14px; max-width:1500px; margin:0 auto; min-height: calc(100vh - 80px); }

.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding:16px; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom:12px; padding-bottom:8px; border-bottom: 2px solid var(--border); display:flex; align-items:center; gap:6px; }
.card-title .icon { font-size:16px; }

.param-group { margin-bottom:10px; }
.param-group label { display:block; font-size:11px; color: var(--sub); margin-bottom:3px; font-weight:600; letter-spacing:.3px; }
.param-group input, .param-group select { width:100%; padding:7px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:13px; outline:none; transition:border .2s; background:#fafbfc; }
.param-group input:focus, .param-group select:focus { border-color: var(--blue); background:#fff; }
.stock-search { position:relative; }
.stock-search .suggestions { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:0 0 8px 8px; max-height:180px; overflow-y:auto; z-index:100; display:none; box-shadow:0 4px 12px rgba(0,0,0,.1); }
.stock-search .suggestions .item { padding:8px 12px; cursor:pointer; font-size:12px; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between; }
.stock-search .suggestions .item:hover { background:#eef5ff; }
.stock-search .suggestions .item .code { color:var(--sub); font-size:11px; }
.preset-stocks { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.preset-stocks button { padding:4px 8px; border:1px solid var(--border); border-radius:4px; background:#fff; font-size:11px; cursor:pointer; white-space:nowrap; transition:all .15s; }
.preset-stocks button:hover { border-color: var(--blue); color: var(--blue); background: #eef5ff; }

.row-2 { display:grid; grid-template-columns: 1fr 1fr; gap:6px; }
.row-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:6px; }
.section-divider { border-top: 1px solid var(--border); margin: 10px 0; padding-top: 8px; }
.section-label { font-size: 10px; color: var(--sub); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

.preset-bar { display:flex; gap:4px; margin-bottom:10px; }
.preset-bar button { flex:1; padding:6px 4px; border:1.5px solid var(--border); border-radius:5px; background:#fff; font-size:11px; cursor:pointer; transition:all .15s; text-align:center; line-height:1.3; }
.preset-bar button:hover { border-color: var(--blue); }
.preset-bar button.active { border-color: var(--blue); background: #eef5ff; color: var(--blue); font-weight:700; }
.preset-bar button .small { font-size:9px; color:var(--sub); display:block; }

.btn { width:100%; padding:10px; border:none; border-radius:7px; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; letter-spacing:.5px; margin-top:8px; }
.btn-primary { background: linear-gradient(135deg, #e74c3c, #c0392b); color:#fff; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(231,76,60,.3); }
.btn-primary:disabled { opacity:.6; cursor:not-allowed; transform:none; }

.chart-area { display:flex; flex-direction:column; gap:12px; }
.chart-box { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding:12px; }
.chart-box .title { font-size:13px; font-weight:700; margin-bottom:6px; }
.chart-container { width:100%; height:300px; }
.chart-container-sm { width:100%; height:220px; }

.loading-overlay { display:none; position:absolute; inset:0; background:rgba(255,255,255,.85); z-index:10; justify-content:center; align-items:center; flex-direction:column; border-radius:var(--radius); }
.loading-overlay.active { display:flex; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color: var(--blue); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { margin-top:8px; font-size:12px; color: var(--sub); }

.metric-grid { display:grid; grid-template-columns: 1fr 1fr; gap:6px; }
.metric-item { text-align:center; padding:8px 5px; background:#f8f9fc; border-radius:7px; }
.metric-item .val { font-size:18px; font-weight:800; }
.metric-item .lbl { font-size:9px; color: var(--sub); margin-top:1px; }
.val-up { color: #e74c3c; }
.val-down { color: #27ae60; }

.trade-table { width:100%; font-size:10px; border-collapse:collapse; margin-top:6px; }
.trade-table th { background:#f8f9fc; padding:5px 4px; text-align:left; font-weight:600; font-size:9px; color:var(--sub); border-bottom:2px solid var(--border); }
.trade-table td { padding:5px 4px; border-bottom:1px solid #f0f0f0; }
.trade-table .win { color: #e74c3c; }
.trade-table .loss { color: #27ae60; }
.trade-table tbody { display:block; max-height:260px; overflow-y:auto; }
.trade-table thead, .trade-table tbody tr { display:table; width:100%; table-layout:fixed; }

.empty-state { text-align:center; padding:50px 20px; color: var(--sub); }
.empty-state p { font-size:13px; line-height:1.8; }

.toast { position:fixed; top:16px; right:16px; padding:10px 18px; border-radius:8px; color:#fff; font-size:12px; z-index:9999; opacity:0; transform:translateX(100%); transition:all .3s; max-width:340px; }
.toast.show { opacity:1; transform:translateX(0); }
.toast-success { background:#27ae60; }
.toast-error { background:#e74c3c; }
.toast-info { background:#3498db; }

@media (max-width: 1100px) {
  .layout { grid-template-columns: 1fr; }
  .right-panel { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
}
</style>
</head>
<body>

  {code:'600276',name:'恒瑞医药',m:'sh'},{code:'600309',name:'万华化学',m:'sh'},{code:'600406',name:'国电南瑞',m:'sh'},
  {code:'600436',name:'片仔癀',m:'sh'},{code:'600438',name:'通威股份',m:'sh'},{code:'600519',name:'贵州茅台',m:'sh'},
  {code:'600585',name:'海螺水泥',m:'sh'},{code:'600809',name:'山西汾酒',m:'sh'},{code:'600837',name:'海通证券',m:'sh'},

// ======================== UTILS ========================
function detectMarket(code) {
  code = String(code).padStart(6,'0');
  return ['0','3'].includes(code[0]) ? 'sz' : 'sh';
}

function formatPct(n) { return (n>=0?'+':'')+n.toFixed(2)+'%'; }
function pctColor(n) { return n>=0?'val-up':'val-down'; }

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast toast-'+type+' show';
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), 3000);
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.add('active');
  document.getElementById('btnRun').disabled = true;
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('active');
  document.getElementById('btnRun').disabled = false;
}

// ======================== PRESET HANDLER ========================
function setParamsPreset(sys, btn) {
  document.querySelectorAll('.preset-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (sys === 1) {
    document.getElementById('entryPeriod').value = 20;
    document.getElementById('exitPeriod').value = 10;
    document.getElementById('sys1Filter').value = '1';
  } else if (sys === 2) {
    document.getElementById('entryPeriod').value = 55;
    document.getElementById('exitPeriod').value = 20;
    document.getElementById('sys1Filter').value = '0';
  }
  // sys === 3: custom, don't change values
}

// ======================== DATA FETCH (NO CACHE, PAGINATED) ========================
const API_BASE = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get';
const PAGE_SIZE = 640;
const MAX_PAGES = 5;
const MIN_DATE = '2005-01-01';

async function fetchOnePage(mkt, num, startDate, endDate) {
  const url = `${API_BASE}?param=${mkt}${num},day,${startDate||''},${endDate||''},${PAGE_SIZE},qfq`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json = await resp.json();
  if (json.code !== 0) return null;
  return json;
}

async function fetchStockData(code) {
  const tsCode = detectMarket(code) + String(code).padStart(6,'0');
  const mkt = tsCode.slice(0, 2);
  const num = tsCode.slice(2);
  const key = mkt + num;

  // Page 1: most recent data
  const page1 = await fetchOnePage(mkt, num, '', '');
  if (!page1) throw new Error('API错误');
  const stock1 = page1.data?.[key];
  if (!stock1) throw new Error('未找到该股票（请检查代码是否正确）');

  const name = stock1.qt?.[key]?.[1] || '';
  let allRows = [...(stock1.qfqday || stock1.day || [])];

  if (!allRows.length) throw new Error('K线数据为空');

  // Paginate backwards until we have enough history
  let pageCount = 1;
  while (pageCount < MAX_PAGES) {
    const earliestDate = allRows[0][0]; // first row date
    if (earliestDate <= MIN_DATE) break;

    // Fetch page before earliest date
    const endDate = earliestDate;
    const pageN = await fetchOnePage(mkt, num, '2000-01-01', endDate);
    if (!pageN) break;

    const stockN = pageN.data?.[key];
    if (!stockN) break;

    const newRows = stockN.qfqday || stockN.day || [];
    if (!newRows.length) break;

    // Merge: prepend rows before earliestDate (exclude duplicate edge)
    const filtered = newRows.filter(r => r[0] < earliestDate);
    if (!filtered.length) break;

    allRows = [...filtered, ...allRows];
    pageCount++;

    // If the first new row is already before MIN_DATE, stop
    if (filtered[0][0] <= MIN_DATE) break;
  }

  const data = allRows.map(r => ({
    date: r[0], open: +r[1], close: +r[2], high: +r[3], low: +r[4], volume: +(r[5]||0)
  })).filter(d => d.date && d.close > 0);

  if (data.length < 60) throw new Error('数据不足（<60个交易日）');

  return { data, name, count: data.length, lastDate: data[data.length-1].date, pages: pageCount };
}

// ======================== INDICATORS ========================
const IND = {
  TR(data) {
    const tr = new Array(data.length).fill(0);
    for (let i=1;i<data.length;i++) {
      const h=data[i].high,l=data[i].low,pc=data[i-1].close;
      tr[i]=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    }
    tr[0]=tr[1]||0; return tr;
  },
  SMA(arr,p) {
    const r=new Array(arr.length).fill(0); let s=0;
    for(let i=0;i<arr.length;i++){s+=arr[i];if(i>=p)s-=arr[i-p];r[i]=i>=p-1?s/p:s/(i+1);}
    return r;
  },
  ATR(data,p) { return this.SMA(this.TR(data),p); },
  rollMax(arr,p) {
    const r=new Array(arr.length).fill(0);
    for(let i=0;i<arr.length;i++){let mx=arr[i];for(let j=Math.max(0,i-p+1);j<=i;j++){if(arr[j]>mx)mx=arr[j];}r[i]=mx;}
    return r;
  },
  rollMin(arr,p) {
    const r=new Array(arr.length).fill(0);
    for(let i=0;i<arr.length;i++){let mn=arr[i];for(let j=Math.max(0,i-p+1);j<=i;j++){if(arr[j]<mn)mn=arr[j];}r[i]=mn;}
    return r;
  }
};

// ======================== BACKTEST ENGINE ========================
function runTurtleBacktest(data, params) {
  const { entryPeriod, exitPeriod, atrPeriod, riskPercent, maxUnits, addGapATR, stopLossATR,
          initialCapital, commission, slippage, sys1Filter } = params;

  const atr = IND.ATR(data, atrPeriod);
  const highs = data.map(d=>d.high), lows = data.map(d=>d.low), closes = data.map(d=>d.close);

  const maxLB = Math.max(entryPeriod, exitPeriod, atrPeriod) + 5;
  const startI = Math.max(maxLB, 0);

  let cash = initialCapital;
  let lots = [];
  let equity = [];
  let trades = [];
  let markers = [];
  let lastBreakoutPnl = null;
  let inBreakout = false;

  // Benchmark: buy & hold
  const bhS = Math.floor(initialCapital / data[startI].close);
  const bhCost = bhS * data[startI].close * (1+commission);
  const bhCash = initialCapital - bhCost;
  const bench = [];

  for (let i=0; i<=startI; i++) { equity.push(initialCapital); bench.push(initialCapital); }

  for (let i=startI+1; i<data.length; i++) {
    const t = data[i], prev = data[i-1];
    const tc=t.close, th=t.high, tl=t.low, to=t.open;

    let posVal=0; for(const l of lots) posVal+=l.shares*tc;
    const totEq = cash + posVal;
    equity.push(totEq); bench.push(bhCash+bhS*tc);

    // 1. Stop loss
    const surv=[];
    for(const l of lots){
      if(tl <= l.stopPrice){
        let px = l.stopPrice;
        if(to < l.stopPrice) px = to;
        px = Math.max(px*(1-slippage), prev.close*0.9);
        const proceeds = l.shares*px*(1-commission);
        const pnl = proceeds - l.shares*l.entryPrice*(1+commission);
        cash += proceeds;
        trades.push({date:t.date,type:'止损平仓',price:px,shares:l.shares,pnl,pnlPct:pnl/(l.shares*l.entryPrice*(1+commission))*100});
        markers.push({date:t.date,type:'sell',price:px,equity:totEq});
      } else { surv.push(l); }
    }
    lots = surv;

    // 2. Exit breakout
    if(lots.length > 0){
      const exitLo = IND.rollMin(lows, exitPeriod)[i-1];
      if(tc < exitLo){
        let tp=0;
        for(const l of lots){
          let px=Math.max(tc*(1-slippage),prev.close*0.9);
          const proceeds=l.shares*px*(1-commission);
          const pnl=proceeds-l.shares*l.entryPrice*(1+commission);
          tp+=pnl; cash+=proceeds;
          trades.push({date:t.date,type:'突破退出',price:px,shares:l.shares,pnl,pnlPct:pnl/(l.shares*l.entryPrice*(1+commission))*100});
        }
        markers.push({date:t.date,type:'sell',price:tc,equity:totEq});
        if(inBreakout){ lastBreakoutPnl=tp; inBreakout=false; }
        lots=[];
      }
    }

    // 3. Unit size
    const curATR = atr[i-1] || 0.01;
    const riskAmt = (cash+posVal)*(riskPercent/100);
    const unitSz = Math.max(100, Math.floor(riskAmt/curATR/100)*100);

    // 4. Entry breakout
    const entryHi = IND.rollMax(highs, entryPeriod)[i-1];

    if(lots.length===0){
      if(tc > entryHi){
        let skip = false;
        if(sys1Filter && lastBreakoutPnl !== null && lastBreakoutPnl > 0){
          skip = true;
          lastBreakoutPnl = null; // reset after skip so next breakout is accepted
        }
        if(!skip){
          let ep = Math.min(tc*(1+slippage), prev.close*1.1);
          const cost = unitSz*ep*(1+commission);
          if(cost <= cash && unitSz>0){
            const sp = ep - stopLossATR*curATR;
            lots.push({shares:unitSz,entryPrice:ep,entryDate:t.date,stopPrice:sp});
            cash-=cost; inBreakout=true; lastBreakoutPnl=null;
            trades.push({date:t.date,type:'突破买入',price:ep,shares:unitSz,pnl:0,pnlPct:0});
            markers.push({date:t.date,type:'buy',price:ep,equity:totEq});
          }
        }
      }
    } else {
      // Pyramiding
      if(lots.length < maxUnits){
        const lastEntry = lots[lots.length-1].entryPrice;
        if(tc >= lastEntry + addGapATR*curATR){
          let ep = Math.min(tc*(1+slippage), prev.close*1.1);
          const cost = unitSz*ep*(1+commission);
          if(cost <= cash && unitSz>0){
            const sp = ep - stopLossATR*curATR;
            lots.push({shares:unitSz,entryPrice:ep,entryDate:t.date,stopPrice:sp});
            cash-=cost;
            trades.push({date:t.date,type:'金字塔加仓',price:ep,shares:unitSz,pnl:0,pnlPct:0});
            markers.push({date:t.date,type:'buy',price:ep,equity:totEq});
          }
        }
      }
    }
  }

  return { equity, bench, trades, markers, data, startI };
}

// ======================== METRICS ========================
function calcMetrics(equity, bench, trades, data, startI) {
  const n=equity.length;
  const totalRet=(equity[n-1]-equity[0])/equity[0]*100;
  const bhRet=(bench[n-1]-bench[0])/bench[0]*100;
  const tDays=data.length-startI;
  const yrs=tDays/252;
  const annRet=(Math.pow(1+totalRet/100,1/yrs)-1)*100;
  const bhAnnRet=(Math.pow(1+bhRet/100,1/yrs)-1)*100;

  let peak=equity[0],maxDD=0,peakI=0,ddStart=0,ddEnd=0;
  const dds=[];
  for(let i=0;i<n;i++){
    if(equity[i]>peak){peak=equity[i];peakI=i;}
    const dd=(peak-equity[i])/peak*100; dds.push(-dd);
    if(dd>maxDD){maxDD=dd;ddStart=peakI;ddEnd=i;}
  }

  const dRets=[];
  for(let i=1;i<n;i++){if(equity[i-1]>0)dRets.push((equity[i]-equity[i-1])/equity[i-1]);}
  const mu=dRets.reduce((a,b)=>a+b,0)/dRets.length;
  const va=dRets.reduce((a,b)=>a+(b-mu)**2,0)/dRets.length;
  const annVol=Math.sqrt(va)*Math.sqrt(252)*100;
  const sharpe=annVol>0?(annRet/100-0.02)/(annVol/100):0;
  const calmar=maxDD>0?(annRet/100)/(maxDD/100):0;

  const closed=trades.filter(t=>t.type!=='突破买入'&&t.type!=='金字塔加仓');
  const opened=trades.filter(t=>t.type==='突破买入'||t.type==='金字塔加仓');
  const wins=closed.filter(t=>t.pnl>0),losses=closed.filter(t=>t.pnl<0);
  const winRate=closed.length>0?wins.length/closed.length*100:0;
  const tw=wins.reduce((a,t)=>a+t.pnl,0);
  const tl=Math.abs(losses.reduce((a,t)=>a+t.pnl,0));
  const pf=tl>0?tw/tl:(tw>0?Infinity:0);

  let mw=0,ml=0,cw=0,cl=0;
  for(const t of closed){
    if(t.pnl>0){cw++;cl=0;if(cw>mw)mw=cw;}
    else if(t.pnl<0){cl++;cw=0;if(cl>ml)ml=cl;}
  }

  return {
    totalRet,bhRet,excessRet:totalRet-bhRet,annRet,bhAnnRet,
    maxDD,annVol,sharpe,calmar,
    totalTrades:opened.length,closedTrades:closed.length,
    winRate,avgWin:wins.length>0?tw/wins.length:0,avgLoss:losses.length>0?tl/losses.length:0,profitFactor:pf,
    maxConsecWins:mw,maxConsecLosses:ml,drawdowns:dds
  };
}

// ======================== CHARTS ========================
let ecEquity, ecDD, ecAnnual;

function initCharts() {
  ecEquity = echarts.init(document.getElementById('chartEquity'));
  ecDD = echarts.init(document.getElementById('chartDrawdown'));
  ecAnnual = echarts.init(document.getElementById('chartAnnual'));
  window.addEventListener('resize',()=>{ecEquity?.resize();ecDD?.resize();ecAnnual?.resize();});
}

function renderEquity(result) {
  const {equity,bench,data,markers,startI}=result;
  const dates=data.slice(startI).map(d=>d.date);
  const eq=equity.slice(1),bm=bench.slice(1);

  // Build date→index map
  const dateIdx={};
  dates.forEach((d,i)=>{dateIdx[d]=i;});

  // Map markers to chart coordinates
  const buyPoints=[], sellPoints=[];
  if(markers){
    // Only show first buy and last sell per cycle to reduce clutter
    let lastBuyDate=null, lastSellType=null;
    markers.forEach(m=>{
      const idx=dateIdx[m.date];
      if(idx===undefined) return;
      const eqVal=equity[idx+1]; // equity is one element ahead
      if(m.type==='buy'){
        if(lastBuyDate!==m.date){ // avoid duplicates
          buyPoints.push({value:[idx,eqVal],date:m.date,price:m.price});
          lastBuyDate=m.date;
        }
      }else{
        if(lastSellType!==m.date){
          sellPoints.push({value:[idx,eqVal],date:m.date,price:m.price});
          lastSellType=m.date;
        }
      }
    });
  }

  ecEquity.setOption({
    tooltip:{trigger:'axis',formatter:p=>{
      if(!p||!p.length) return '';
      let s=p[0].axisValue+'<br/>';
      p.forEach(x=>{
        if(x.seriesName==='买入'||x.seriesName==='卖出'){
          const d=x.data||{};
          s+=`${x.marker} ${x.seriesName}: ¥${d.price||''}<br/>`;
        }else{
          const ret=((x.value-equity[0])/equity[0]*100).toFixed(2);
          s+=`${x.marker} ${x.seriesName}: ¥${x.value.toFixed(0)} (${ret}%)<br/>`;
        }
      });
      return s;
    }},
    legend:{data:['策略权益','买入持有','买入','卖出'],top:3,textStyle:{fontSize:11}},
    grid:{left:60,right:35,top:35,bottom:25},
    xAxis:{type:'category',data:dates,axisLabel:{fontSize:9,rotate:25,formatter:v=>v.slice(0,7)}},
    yAxis:{type:'value',axisLabel:{fontSize:9,formatter:v=>(v/10000).toFixed(0)+'万'}},
    series:[
      {name:'策略权益',type:'line',data:eq,smooth:true,lineStyle:{color:'#e74c3c',width:2},symbol:'none',z:1},
      {name:'买入持有',type:'line',data:bm,smooth:true,lineStyle:{color:'#95a5a6',width:1.5,type:'dashed'},symbol:'none',z:1},
      {name:'买入',type:'scatter',data:buyPoints,symbol:'triangle',symbolSize:10,itemStyle:{color:'#e74c3c'},z:2},
      {name:'卖出',type:'scatter',data:sellPoints,symbol:'triangle',symbolSize:10,symbolRotate:180,itemStyle:{color:'#27ae60'},z:2}
    ]
  },true);
}

function renderDD(result) {
  const {data,metrics,startI}=result;
  const dates=data.slice(startI).map(d=>d.date);
  ecDD.setOption({
    tooltip:{trigger:'axis',formatter:p=>`${p[0].axisValue}<br/>回撤: ${p[0].value.toFixed(2)}%`},
    grid:{left:50,right:15,top:10,bottom:25},
    xAxis:{type:'category',data:dates,axisLabel:{fontSize:9,rotate:25,formatter:v=>v.slice(0,7)}},
    yAxis:{type:'value',axisLabel:{fontSize:9,formatter:v=>v+'%'},max:0},
    series:[{
      type:'line',data:metrics.drawdowns,smooth:true,lineStyle:{color:'#27ae60',width:0},
      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(39,174,96,0.4)'},{offset:1,color:'rgba(39,174,96,0.02)'}])},
      markLine:{silent:true,data:[{yAxis:-metrics.maxDD,label:{formatter:`最大回撤 ${metrics.maxDD.toFixed(2)}%`,fontSize:9}}],lineStyle:{color:'#e74c3c',type:'dashed'}},
      symbol:'none'
    }]
  },true);
}

function renderAnnual(result) {
  const {equity,bench,data,startI}=result;
  const dates=data.slice(startI).map(d=>d.date);
  const ann={};
  for(let i=0;i<dates.length;i++){
    const y=dates[i].slice(0,4);
    if(!ann[y])ann[y]={sS:0,sE:0,bS:0,bE:0,c:0};
    if(ann[y].c===0){ann[y].sS=i>0?equity[i]:equity[0];ann[y].bS=i>0?bench[i]:bench[0];}
    ann[y].sE=equity[i+1]||equity[i];ann[y].bE=bench[i+1]||bench[i];ann[y].c++;
  }
  const yrs=Object.keys(ann).sort();
  const sR=yrs.map(y=>ann[y].sS>0?(ann[y].sE-ann[y].sS)/ann[y].sS*100:0);
  const bR=yrs.map(y=>ann[y].bS>0?(ann[y].bE-ann[y].bS)/ann[y].bS*100:0);
  ecAnnual.setOption({
    tooltip:{trigger:'axis'},
    legend:{data:['策略','买入持有'],top:3,textStyle:{fontSize:11}},
    grid:{left:45,right:15,top:35,bottom:25},
    xAxis:{type:'category',data:yrs,axisLabel:{fontSize:10}},
    yAxis:{type:'value',axisLabel:{fontSize:9,formatter:v=>v+'%'}},
    series:[
      {name:'策略',type:'bar',data:sR,itemStyle:{color:p=>p.value>=0?'#e74c3c':'#27ae60'},barMaxWidth:18},
      {name:'买入持有',type:'bar',data:bR,itemStyle:{color:p=>p.value>=0?'#fab1a0':'#55efc4'},barMaxWidth:18}
    ]
  },true);
}

// ======================== UI RENDER ========================
function renderMetrics(m) {
  document.getElementById('metricsGrid').innerHTML = [
    {l:'总收益率',v:formatPct(m.totalRet),c:pctColor(m.totalRet)},
    {l:'年化收益率',v:formatPct(m.annRet),c:pctColor(m.annRet)},
    {l:'超额收益',v:formatPct(m.excessRet),c:pctColor(m.excessRet)},
    {l:'最大回撤',v:m.maxDD.toFixed(2)+'%',c:'val-down'},
    {l:'年化波动率',v:m.annVol.toFixed(2)+'%',c:'val-down'},
    {l:'夏普比率',v:m.sharpe.toFixed(2),c:m.sharpe>0?'val-up':'val-down'},
    {l:'卡尔玛比率',v:m.calmar.toFixed(2),c:m.calmar>0?'val-up':'val-down'},
    {l:'胜率',v:m.winRate.toFixed(1)+'%',c:m.winRate>=50?'val-up':'val-down'},
    {l:'盈亏比',v:m.profitFactor===Infinity?'∞':m.profitFactor.toFixed(2),c:'val-up'},
    {l:'交易次数',v:m.totalTrades,c:''},
    {l:'平仓次数',v:m.closedTrades,c:''},
    {l:'最大连盈',v:m.maxConsecWins+'次',c:'val-up'},
    {l:'最大连亏',v:m.maxConsecLosses+'次',c:'val-down'},
    {l:'平均盈利',v:'¥'+(m.avgWin||0).toFixed(0),c:'val-up'},
    {l:'平均亏损',v:'¥'+(m.avgLoss||0).toFixed(0),c:'val-down'},
  ].map(i=>`<div class="metric-item"><div class="val ${i.c}">${i.v}</div><div class="lbl">${i.l}</div></div>`).join('');
}

function renderTrades(trades) {
  if(!trades||trades.length===0){
    document.querySelector('#tradeTable tbody').innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--sub);padding:30px;">暂无交易记录</td></tr>';
    return;
  }
  document.querySelector('#tradeTable tbody').innerHTML = trades.slice(-60).reverse().map(t=>{
    const c=t.pnl>0?'win':(t.pnl<0?'loss':'');
    const s=t.pnl===0?'-':((t.pnl>=0?'+':'')+t.pnl.toFixed(0)+' ('+(t.pnlPct||0).toFixed(1)+'%)');
    return `<tr><td>${t.date}</td><td>${t.type}</td><td>¥${t.price.toFixed(2)}</td><td>${t.shares}股</td><td class="${c}">${s}</td></tr>`;
  }).join('');
}

// ======================== MAIN ========================
let currentResult=null, currentStockName='';

function selectStock(code, name) {
  document.getElementById('stockCode').value = name ? `${code} ${name}` : code;
  document.getElementById('suggestions').style.display = 'none';
  currentStockName = name || '';
}

async function runBacktest() {
  const raw = document.getElementById('stockCode').value.trim();
  if(!raw){showToast('请先输入股票代码','error');return;}

  const code = raw.split(/\s+/)[0].padStart(6,'0');
  const params = {
    entryPeriod: parseInt(document.getElementById('entryPeriod').value)||20,
    exitPeriod: parseInt(document.getElementById('exitPeriod').value)||10,
    atrPeriod: parseInt(document.getElementById('atrPeriod').value)||20,
    addGapATR: parseFloat(document.getElementById('addGapATR').value)||0.5,
    stopLossATR: parseFloat(document.getElementById('stopLossATR').value)||2.0,
    sys1Filter: parseInt(document.getElementById('sys1Filter').value),
    riskPercent: parseFloat(document.getElementById('riskPercent').value)||1,
    maxUnits: parseInt(document.getElementById('maxUnits').value)||4,
    initialCapital: (parseFloat(document.getElementById('initialCapital').value)||100)*10000,
    commission: (parseFloat(document.getElementById('commission').value)||0.03)/100,
    slippage: (parseFloat(document.getElementById('slippage').value)||0.01)/100,
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value
  };

  showLoading('正在从腾讯财经拉取数据...');
  try {
    // Fetch data directly (no cache)
    const fetchResult = await fetchStockData(code);
    let allData = fetchResult.data;
    showToast(`数据拉取成功 · ${fetchResult.name || code} · ${allData.length}条 · 最新${fetchResult.lastDate}`, 'success');

    // Filter by date range
    let data = allData.filter(d => d.date >= params.startDate && d.date <= params.endDate);
    if(data.length < 60){showToast('回测区间数据不足（至少需60个交易日）','error');hideLoading();return;}

    document.getElementById('loadingText').textContent = '正在执行回测...';
    await new Promise(r=>setTimeout(r,30));

    const btResult = runTurtleBacktest(data, params);
    const metrics = calcMetrics(btResult.equity, btResult.bench, btResult.trades, data, btResult.startI);
    const result = { ...btResult, metrics, data, startI: btResult.startI };
    currentResult = result;

    renderEquity(result);
    renderDD(result);
    renderAnnual(result);
    renderMetrics(metrics);
    renderTrades(btResult.trades);

    showToast(`回测完成 · 总收益 ${formatPct(metrics.totalRet)} · 夏普 ${metrics.sharpe.toFixed(2)} · 胜率 ${metrics.winRate.toFixed(1)}%`, 'success');
  } catch(e) {
    showToast('回测失败: '+e.message, 'error');
    console.error(e);
  }
  hideLoading();
}

// ======================== SEARCH ========================
function setupSearch() {
  const input = document.getElementById('stockCode');
  const box = document.getElementById('suggestions');
  input.addEventListener('input',()=>{
    const q = input.value.trim().toLowerCase();
    if(!q||q.length<1){box.style.display='none';return;}
    const matches = STOCK_DB.filter(s=>s.code.includes(q)||s.name.toLowerCase().includes(q)).slice(0,10);
    if(matches.length===0){
      if(/^\d{6}$/.test(q)){
        const m=detectMarket(q);
        box.innerHTML=`<div class="item" data-code="${q}"><span>${q}</span><span class="code">${m.toUpperCase()}</span></div>`;
        box.style.display='block';
      }else{box.style.display='none';}
      return;
    }
    box.innerHTML=matches.map(s=>`<div class="item" data-code="${s.code}" data-name="${s.name}"><span>${s.name}</span><span class="code">${s.code} · ${s.m.toUpperCase()}</span></div>`).join('');
    box.style.display='block';
    box.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>selectStock(el.dataset.code,el.dataset.name)));
  });
  input.addEventListener('blur',()=>setTimeout(()=>box.style.display='none',200));
}

// ======================== INIT ========================
document.addEventListener('DOMContentLoaded',()=>{
  initCharts();
  setupSearch();
  selectStock('000001','平安银行');
});
